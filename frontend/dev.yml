services:
  frontend_dev:
    container_name: frontend_dev
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NGINX_PORT: 80 # temp
      NGINX_PROXY: http://backend_dev:6900
    ports:
      - "7777:80"
    networks:
      - test-network
networks:
  test-network:
    external: true
