# Don't forget to change {fetchingEndpoint.ts} in frontend to fetch to backend directly via docker-network for this dev. deployment

name: "dev_incexp"
services:
  database:
    image: postgres:17.6-alpine
    container_name: dev_incexp_database
    environment:
      POSTGRES_USER: ${POSTGRES_SUPER_USER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPER_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_MAP_PORT}:${POSTGRES_PORT}
    volumes:
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "postgres"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 5s
    networks:
      - dev-network

  backend:
    build:
      context: ../backend
      dockerfile: Dev_Dockerfile
    container_name: dev_incexp_backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - .env
    volumes:
      - init:/app/.init
      - ../backend:/app # mapped backend dir to /app
      - /app/node_modules # prevent overriding
      - /app/scripts
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6900/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 5s
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dev_Dockerfile
    container_name: dev_incexp_frontend
    ports:
      - "${FRONTEND_MAP_PORT}:5173"
    volumes:
      - ../frontend:/app # mapped frontend dir to /app
      - /app/node_modules # prevent overriding
    networks:
      - dev-network
    depends_on:
      database:
        condition: service_healthy
      backend:
        condition: service_healthy
networks:
  dev-network:
volumes:
  database_data:
  init:
